plugins {
    id "com.android.application"
}

android {
    namespace "com.envprobe"
    compileSdk 35

    defaultConfig {
        applicationId "com.envprobe"
        minSdk 26
        targetSdk 35
        versionCode 2
        versionName "1.1"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        debug { minifyEnabled false }
        release { minifyEnabled false }
    }
}

// 不依赖 AndroidX，避免 kotlin-stdlib 冲突
dependencies {
}
