<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eBPF Stats</title>
  <style>
    :root { color-scheme: dark; --bg:#0d1117; --panel:#161b22; --line:#30363d; --text:#e6edf3; --muted:#8b949e; --ok:#3fb950; --warn:#d29922; --bad:#f85149; --blue:#58a6ff; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; min-height:62px; padding:12px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(13,17,23,.96); z-index:4; }
    h1 { margin:0; font-size:20px; }
    button { border:1px solid var(--line); background:var(--panel); color:var(--text); padding:8px 12px; border-radius:6px; cursor:pointer; }
    button:active { background:#21262d; }
    main { max-width:1100px; margin:0 auto; padding:18px 20px 40px; }
    #status { color:var(--muted); margin:0 0 16px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:15px; cursor:pointer; }
    .card:hover { border-color:var(--blue); }
    .title { font-weight:650; overflow-wrap:anywhere; }
    .sub { color:var(--muted); font-size:12px; margin-top:2px; }
    .metrics { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:14px; }
    .metric { border-top:1px solid var(--line); padding-top:7px; }
    .metric b { display:block; font-size:19px; }
    .metric span { color:var(--muted); font-size:12px; }
    .ok { color:var(--ok); } .warn { color:var(--warn); } .bad { color:var(--bad); } .blue { color:var(--blue); }
    section { margin-top:22px; }
    section h2 { font-size:16px; margin:0 0 10px; }
    .toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; padding:10px 0; border-bottom:1px solid var(--line); }
    .toolbar-actions { display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:8px; }
    table { width:100%; border-collapse:collapse; min-width:620px; }
    th,td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--muted); font-weight:500; }
    td.path { overflow-wrap:anywhere; font-family:ui-monospace,SFMono-Regular,monospace; font-size:12px; }
    .risk-stack { display:grid; gap:10px; }
    .risk-group { background:var(--panel); border:1px solid var(--line); border-left:4px solid var(--line); border-radius:8px; overflow:visible; }
    .risk-group.high { border-left-color:var(--bad); }
    .risk-group.medium { border-left-color:var(--warn); }
    .risk-group.low { border-left-color:var(--blue); }
    .risk-group.miss { border-left-color:#6e7681; }
    .risk-group summary { cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 14px; user-select:none; }
    .risk-group summary::-webkit-details-marker { display:none; }
    .risk-name { font-weight:650; }
    .risk-meta { color:var(--muted); font-size:12px; }
    .risk-group[open] summary { border-bottom:1px solid var(--line); }
    .risk-group[open] > summary { position:sticky; top:62px; z-index:3; background:var(--panel); border-radius:6px 6px 0 0; }
    .risk-group summary::after { content:"＋"; color:var(--muted); font-size:18px; }
    .risk-group[open] summary::after { content:"−"; }
    .risk-group .table-wrap { border:0; border-radius:0; }
    .empty { border:1px dashed var(--line); border-radius:8px; padding:24px; color:var(--muted); text-align:center; }
    @media (max-width:600px) { header { padding:14px; } main { padding:14px; } .grid { grid-template-columns:1fr; } .toolbar { align-items:flex-start; flex-direction:column; } .toolbar-actions { justify-content:flex-start; } }
  </style>
</head>
<body>
  <header><h1>eBPF Stats</h1><button id="refresh" type="button">刷新</button></header>
  <main>
    <p id="status">正在读取模块数据...</p>
    <div id="apps" class="grid"></div>
    <section id="detail" hidden>
      <div class="toolbar"><h2 id="detail-title"></h2><div class="toolbar-actions"><button id="export" type="button">导出</button><button id="expand-all" type="button">全部展开</button><button id="collapse-all" type="button">全部折叠</button><button id="back" type="button">返回列表</button></div></div>
      <div id="results"></div>
    </section>
  </main>
  <script src="./app.bundle.js"></script>
</body>
</html>
